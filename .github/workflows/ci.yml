name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check repository
        run: python -m vibe_coding_infra check
      - name: Run tests
        run: python -m unittest discover -s tests
